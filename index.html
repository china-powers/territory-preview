<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;}
body{background:#0a0e17;font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;}
#app{width:100%;max-width:480px;height:100vh;max-height:900px;background:linear-gradient(145deg,#111827,#0f172a);display:flex;flex-direction:column;position:relative;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.8);}
.header{display:flex;align-items:center;justify-content:space-between;padding:6px 10px 4px;background:rgba(0,0,0,.4);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;z-index:10;}
.header .left{display:flex;align-items:center;gap:5px;}
.header .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.header .lb{font-size:11px;color:#94a3b8;}
.header .tp{font-size:13px;font-weight:700;color:#fff;}
.timer{font-size:18px;font-weight:900;font-variant-numeric:tabular-nums;color:#38bdf8;letter-spacing:1px;}
.timer.warn{color:#ef4444;animation:pulse 1s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.dia{display:flex;align-items:center;gap:3px;font-size:12px;color:#fbbf24;font-weight:700;}
.sb{display:flex;gap:2px;padding:2px 6px;flex-shrink:0;background:rgba(0,0,0,.2);border-bottom:1px solid rgba(255,255,255,.04);flex-wrap:wrap;}
.sbi{flex:1;min-width:60px;display:flex;align-items:center;gap:2px;padding:1px 4px;border-radius:3px;font-size:9px;background:rgba(255,255,255,.04);}
.sbi .sd{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sbi .sn{color:#94a3b8;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:8px;}
.sbi .st{color:#e2e8f0;font-weight:700;font-size:10px;}
.sbi .sl{color:#64748b;font-size:8px;}
.sbi .se{color:#4ade80;font-size:8px;}
.sbi.me{background:rgba(56,189,248,.12);}
.mapC{flex:1;position:relative;overflow:auto;min-height:0;display:flex;align-items:center;justify-content:center;padding:4px;}
.mapC::-webkit-scrollbar{width:2px;height:2px;}
.mapC::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}

.grid{position:relative;flex-shrink:0;}
.cell{
  position:absolute;border-radius:3px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;
  font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.6);
  transition:opacity .15s,border-color .15s;overflow:hidden;
}
.cell .ct{font-size:12px;line-height:1;}
.cell .cs{font-size:7px;color:rgba(255,255,255,.4);line-height:1;position:absolute;top:2px;right:3px;}
.cell.sel{border-color:#fff!important;z-index:3;}
.cell.tgt{animation:glow .6s ease-in-out infinite;z-index:2;}
@keyframes glow{0%,100%{opacity:.8;border-color:#fff}50%{opacity:1;border-color:#ffe066}}
.cell .battle-bar{
  position:absolute;bottom:0;left:0;height:3px;background:rgba(255,255,255,.3);transition:width .3s;
}
.cell .battle-bar .fill{height:100%;background:#ffe066;transition:width .3s;}

.eb{position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:5;display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);border-radius:0 0 8px 8px;padding:2px 10px 3px;border:1px solid rgba(255,255,255,.06);border-top:none;pointer-events:none;}
.eb .el{font-size:9px;color:#64748b;}
.eb .ev{font-size:12px;font-weight:900;color:#4ade80;}

.bb{flex-shrink:0;padding:4px 6px 6px;background:rgba(0,0,0,.4);border-top:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;gap:4px;}
.ir{display:flex;gap:3px;overflow-x:auto;padding-bottom:1px;}
.ib{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:3px 6px;border-radius:5px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);cursor:pointer;gap:1px;font-size:8px;color:#e2e8f0;}
.ib:hover{background:rgba(255,255,255,.12);}
.ib .ip{font-size:7px;color:#fbbf24;font-weight:700;}
.ib.used{opacity:.4;pointer-events:none;}
.ba{display:flex;gap:4px;align-items:center;}
.ba button{flex:1;padding:5px 0;border:none;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;}
.bf{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;}
.bh{background:linear-gradient(135deg,#6366f1,#4338ca);color:#fff;font-size:9px;}
.bm{background:rgba(255,255,255,.08);color:#94a3b8;font-size:9px;flex:0 0 auto;padding:5px 10px;}

.toast{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:6px 14px;border-radius:7px;font-size:11px;font-weight:600;z-index:50;white-space:nowrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);animation:ti .25s ease-out;}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="left"><span class="dot" style="background:#ef4444"></span><span class="lb">你</span><span class="tp" id="myT">0</span></div>
    <div class="timer" id="timer">05:00</div>
    <div class="dia">💎<span id="dC">200</span></div>
  </div>
  <div class="sb" id="sb"></div>
  <div class="mapC" id="mapC"><div class="grid" id="grid"></div></div>
  <div class="eb" id="eb" style="display:none"><span class="el">📈效率</span><span class="ev" id="ev">x1.0</span></div>
  <div class="bb">
    <div class="ir" id="ir"></div>
    <div class="ba">
      <button class="bm">⚡5:00</button>
      <button class="bf" id="helpB">🎯选领地→点目标</button>
      <button class="bh" id="adB">📺+20💎</button>
    </div>
  </div>
</div>

<script>
// ===== CONFIG =====
const PN=['你','蓝方','绿方','橙方'], PC=['#ef4444','#3b82f6','#22c55e','#f97316'];
const GRID=9, CELL_SIZE=46, GAP=2;
const TOTAL_T=GRID*GRID; // 81

// Player starts: 4 corners each with 4 territories
const PSTARTS={
  0:[0,1,9,10],           // top-left
  1:[8,17,7,16],          // top-right  (col 7,8 rows 0,1)
  2:[72,73,63,64],        // bottom-left (row 7,8 col 0,1) 
  3:[80,79,71,70],        // bottom-right (row 7,8 col 7,8)
};

function idFromRC(r,c){return r*GRID+c;}
function rcFromId(id){return{r:Math.floor(id/GRID),c:id%GRID};}

// Build territory data
const TERRITORIES=[];
for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
  const id=r*GRID+c;
  const n=[];
  if(r>0)n.push(idFromRC(r-1,c));
  if(r<GRID-1)n.push(idFromRC(r+1,c));
  if(c>0)n.push(idFromRC(r,c-1));
  if(c<GRID-1)n.push(idFromRC(r,c+1));
  TERRITORIES.push({id, r, c, n});
}

// ===== STATE =====
let G={
  pl:[],t:[],sel:null,cp:0,tl:300,dia:200,run:true,over:false,
  battles:{}, // id -> {progress, atkOwner, atkTroops, defTroops, uid}
  _buid:0,
};

// ===== HELPERS =====
function findR(pid){
  const v=new Set(),r=[];
  G.t.filter(t=>t.owner===pid).forEach(t=>{
    if(v.has(t.id))return;
    const reg=[],q=[t.id];v.add(t.id);
    while(q.length){const c=q.shift();reg.push(c);
      G.t[c].n.forEach(n=>{const nt=G.t[n];if(nt.owner===pid&&!v.has(n)){v.add(n);q.push(n);}});}
    r.push(reg);
  });return r;
}
function rTr(ids){return ids.reduce((s,i)=>s+Math.floor(G.t[i].troops),0);}
function eff(l){return l<=1?1:1+(l-1)*0.08;}
function tProd(pid){const p=G.pl[pid];if(!p||!p.alive||!p.lands)return 0;return Math.floor(p.lands*2*eff(p.lands));}
function adj(a,b){for(const sa of a)for(const n of G.t[sa].n)if(b.includes(n))return true;return false;}

// ===== RENDER =====
let _cellSize=CELL_SIZE,_gap=GAP;

function render(){
  const grid=document.getElementById('grid');
  const avail=Math.min(document.getElementById('mapC').clientWidth-8,document.getElementById('mapC').clientHeight-8);
  const totalW=GRID*CELL_SIZE+(GRID-1)*GAP;
  const scale=Math.min(1,avail/totalW);
  _cellSize=CELL_SIZE*scale; _gap=GAP*scale;
  const gw=GRID*_cellSize+(GRID-1)*_gap;
  grid.style.width=gw+'px';grid.style.height=gw+'px';

  let html='';
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    const id=r*GRID+c,t=G.t[id];
    const x=c*(_cellSize+_gap),y=r*(_cellSize+_gap);
    const col=t.owner<0?'#334155':PC[t.owner];
    const isSel=G.sel&&G.sel.player===G.cp&&G.sel.tid===id;
    const borderCol=t.owner<0?'#475569':PC[t.owner];
    const opacity=t.owner<0?.6:1;
    const btl=G.battles[id];

    let extra='';
    if(isSel)extra+=' sel';
    if(G.sel&&G.sel.player===G.cp&&t.owner!==G.cp&&t.owner>=0&&adj([G.sel.tid],[id]))extra+=' tgt';
    // Also highlight neutral adjacent
    if(G.sel&&G.sel.player===G.cp&&t.owner<0&&adj([G.sel.tid],[id]))extra+=' tgt';

    const troops=Math.floor(t.troops);
    const bar=btl?Math.floor(btl.progress*100):-1;

    html+=`<div class="cell${extra}" data-id="${id}" style="left:${x}px;top:${y}px;width:${_cellSize}px;height:${_cellSize}px;
background:radial-gradient(circle at 30% 30%,${col}cc,${col}99);border:2px solid ${borderCol};opacity:${opacity}">
<div class="ct">${troops}</div>
<div class="cs">${t.owner<0?'':PN[t.owner][0]}</div>
${bar>=0?`<div class="battle-bar" style="width:100%"><div class="fill" style="width:${bar}%"></div></div>`:''}
</div>`;
  }
  grid.innerHTML=html;

  // Click handler
  grid.querySelectorAll('.cell').forEach(el=>{
    el.onclick=()=>onClick(parseInt(el.dataset.id));
  });

  // Update player count in header
  const p=G.pl[G.cp];
  document.getElementById('myT').textContent=Math.floor(p.troops);
  document.getElementById('dC').textContent=G.dia;
}

// ===== INPUT =====
function onClick(id){
  if(G.over||!G.run)return;
  const t=G.t[id];
  // Click own territory
  if(t.owner===G.cp){
    if(G.sel&&G.sel.player===G.cp&&G.sel.tid===id){G.sel=null;render();return;}
    G.sel={player:G.cp, tid:id};
    render();return;
  }
  // Attack if selected
  if(G.sel&&G.sel.player===G.cp&&adj([G.sel.tid],[id])){
    const src=G.t[G.sel.tid],cnt=Math.floor(src.troops/2);
    if(cnt<=0){show('兵力不足');return;}
    if(G.battles[id]){show('该领地正在战斗中');return;}
    // Start battle
    const uid=++G._buid;
    G.battles[id]={progress:0,atkOwner:G.cp,atkTroops:cnt,defTroops:Math.floor(t.troops),uid,srcId:G.sel.tid};
    src.troops-=cnt;
    show('⚔️进攻 '+getName(id)+'！');
    render();updStats();renderSB();updUI();updEB();
    return;
  }
  if(G.sel)show('目标不相邻');else show('点击己方领地选中');
}

function getName(id){const names=['王城','铁壁','狼烟','哨塔','虎踞','龙盘','隘口','箭楼','烽燧',
  '兵营','校场','武库','粮仓','马厩','瓮城','角楼','箭塔','壕沟',
  '前哨','斥候','驿站','关卡','隧','寨','屯','营','垒',
  '东市','西市','南仓','北库','左营','右营','前军','后军','中军',
  '青龙','白虎','朱雀','玄武','天枢','天璇','天玑','天权','玉衡',
  '开阳','摇光','北斗','南斗','东岳','西岳','南岳','北岳','中岳',
  '春分','夏至','秋分','冬至','立春','立夏','立秋','立冬','谷雨',
  '小满','芒种','小暑','大暑','处暑','白露','霜降','小雪','大雪',
  '甲子','乙丑','丙寅','丁卯','戊辰','己巳','庚午','辛未','壬申',
  '癸酉','甲戌','乙亥','丙子','丁丑','戊寅','己卯','庚辰','辛巳'];
  return names[id]||'第'+(id+1)+'格';}

// ===== BATTLE TICK =====
function tickBattles(){
  for(const id in G.battles){
    const b=G.battles[id],dst=G.t[id];
    const src=G.t[b.srcId];
    // Both sides lose troops per tick
    const dmgAtk=Math.min(b.atkTroops,Math.max(1,Math.floor(b.defTroops*0.08)+1));
    const dmgDef=Math.min(b.defTroops,Math.max(1,Math.floor(b.atkTroops*0.06)+1));
    b.atkTroops-=dmgDef;
    b.defTroops-=dmgAtk;
    // Progress advances based on attacker advantage
    const ratio=b.atkTroops/Math.max(1,b.defTroops+b.atkTroops);
    b.progress+=ratio*0.06-0.03; // net: when ratio>.5, progress increases
    b.progress=Math.max(0,Math.min(1,b.progress));

    if(b.progress>=1){
      // Attacker wins!
      const remaining=Math.max(1,b.atkTroops);
      dst.owner=b.atkOwner;
      dst.troops=remaining;
      delete G.battles[id];
      show('🔥攻占 '+getName(id));
    } else if(b.atkTroops<=0){
      // Defender wins
      dst.troops=Math.max(1,b.defTroops);
      delete G.battles[id];
      show('💥进攻被击退');
    } else if(b.defTroops<=0){
      // Attacker wins (defender wiped)
      dst.owner=b.atkOwner;
      dst.troops=Math.max(1,b.atkTroops);
      delete G.battles[id];
      show('🔥攻占 '+getName(id));
    } else {
      // Update territory troops to show current battle state
      dst.troops=b.defTroops;
      // Also reflect attacker troops in src territory (they're "committed")
    }
  }
}

// ===== AI =====
let aiT=null;
function startAI(){stopAI();aiT=setInterval(()=>{
  for(let i=1;i<G.pl.length;i++)if(G.pl[i].alive)aiTurn(i);
},2500);}
function stopAI(){if(aiT){clearInterval(aiT);aiT=null;}}

function aiTurn(pid){
  if(G.over||!G.run)return;
  const myT=G.t.filter(t=>t.owner===pid&&t.troops>8);
  if(!myT.length)return;
  const shuffled=[...myT].sort(()=>Math.random()-0.5);
  for(const t of shuffled){
    const targets=t.n.filter(n=>{
      const nt=G.t[n];
      return nt.owner!==pid&&!G.battles[n]&&nt.troops<Math.floor(t.troops*0.8);
    });
    if(!targets.length)continue;
    const tgt=targets.sort((a,b)=>G.t[a].troops-G.t[b].troops)[0];
    const cnt=Math.floor(t.troops/2);
    if(cnt>5){
      const uid=++G._buid;
      G.battles[tgt]={progress:0,atkOwner:pid,atkTroops:cnt,defTroops:Math.floor(G.t[tgt].troops),uid,srcId:t.id};
      t.troops-=cnt;
      G.t[tgt].troops=G.battles[tgt].defTroops; // sync
      break;
    }
  }
}

// ===== UPDATE =====
function updStats(){
  G.pl.forEach(p=>{p.troops=0;p.lands=0;});
  G.t.forEach(t=>{if(t.owner>=0){G.pl[t.owner].troops+=Math.floor(t.troops);G.pl[t.owner].lands++;}});
}
function updUI(){
  const p=G.pl[G.cp];
  document.getElementById('myT').textContent=Math.floor(p.troops);
  document.getElementById('dC').textContent=G.dia;
  const timer=document.getElementById('timer'),m=Math.floor(G.tl/60),s=Math.floor(G.tl%60);
  timer.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  timer.classList.toggle('warn',G.tl<60);
}
function updEB(){
  const bar=document.getElementById('eb'),val=document.getElementById('ev'),p=G.pl[G.cp];
  if(p.alive&&p.lands>0){val.textContent='+'+tProd(0)+'/秒(x'+eff(p.lands).toFixed(2)+')';bar.style.display='flex';}
  else bar.style.display='none';
}
function renderSB(){
  document.getElementById('sb').innerHTML=G.pl.map((p,i)=>
    '<div class="sbi'+(i===G.cp?' me':'')+'" style="'+(p.alive?'':'opacity:.3')+'"><span class="sd" style="background:'+p.color+'"></span><span class="sn">'+p.name+(p.alive?'':'💀')+'</span><span class="st">'+Math.floor(p.troops)+'</span><span class="sl">('+p.lands+')</span><span class="se">x'+(p.alive?eff(p.lands).toFixed(2):'0')+'</span></div>'
  ).join('');
}
function checkE(){const a=new Set();G.t.forEach(t=>{if(t.owner>=0)a.add(t.owner);if(G.battles[t.id])a.add(G.battles[t.id].atkOwner);});G.pl.forEach((p,i)=>{p.alive=a.has(i)||i===G.cp;});}
function checkW(){if(G.over)return;const a=G.pl.filter(p=>p.alive);if(a.length<=1&&G.pl.some(p=>p.alive))end(a[0]?.id);}
function end(wid){
  G.over=true;G.run=false;stopAI();if(G.af){cancelAnimationFrame(G.af);G.af=null;}
  const s=G.pl.map((p,i)=>({name:p.name,troops:Math.floor(p.troops),lands:p.lands,score:Math.floor(p.troops)+p.lands*10,alive:p.alive})).sort((a,b)=>b.score-a.score);
  const rk=s.findIndex(x=>x.name===G.pl[G.cp].name)+1;
  let m='🏆对局结束！\n'+(wid===G.cp?'🎉你赢了！':wid>=0?G.pl[wid].name+'获胜':'⚖️平局！')+'\n\n';
  s.forEach((x,i)=>{m+=(['🥇','🥈','🥉'][i]||'#'+(i+1))+' '+x.name+(x.alive?'':'💀')+' 兵'+x.troops+' 地'+x.lands+' 总分'+x.score+'\n';});
  m+='\n排名:'+rk+'/'+s.length;show(m);
}

// ===== ITEMS =====
const SHOP=[{id:'c',name:'征兵令',p:50,l:2},{id:'s',name:'🛡护盾',p:100,l:1},{id:'a',name:'✈空袭',p:200,l:1},{id:'re',name:'📦征兵',p:120,l:1}];
let iU={};
function renderItems(){
  document.getElementById('ir').innerHTML=SHOP.map(it=>'<div class="ib'+(iU[it.id]>=it.limit?' used':'')+'" data-id="'+it.id+'"><span>'+it.name+'</span><span class="ip">💎'+it.p+'</span></div>').join('');
  document.querySelectorAll('.ib:not(.used)').forEach(b=>b.onclick=()=>useI(b.dataset.id));
}
function useI(id){
  if(G.over)return;const item=SHOP.find(i=>i.id===id);if(!item)return;const u=iU[id]||0;
  if(u>=item.l){show('❌已用尽');return;}if(G.dia<item.p){show('💎还差'+(item.p-G.dia));return;}
  G.dia-=item.p;iU[id]=(iU[id]||0)+1;
  if(id==='s'&&G.sel){const t=G.t[G.sel.tid];if(t.owner===G.cp){t._sh=1;show('🛡护盾！');setTimeout(()=>{t._sh=0;},8000);}else{show('先选中己方领地');G.dia+=item.p;iU[id]--;}}
  else if(id==='s'){show('先选中领地');G.dia+=item.p;iU[id]--;}
  else if(id==='a'){const targets=G.t.filter(t=>t.owner!==G.cp&&t.owner>=0);if(targets.length){const t=targets.sort((a,b)=>b.troops-a.troops)[0];let d=Math.min(50,Math.max(1,Math.floor(t.troops-1)));t.troops-=d;show('✈空袭 '+getName(t.id)+'! -'+d);render();renderSB();updUI();updEB();checkE();checkW();}else show('✈无目标');}
  else if(id==='re'){if(G.sel){const t=G.t[G.sel.tid];if(t.owner===G.cp){t.troops+=30;show('📦+30援军');render();renderSB();updUI();updEB();}else{show('先选中己方领地');G.dia+=item.p;iU[id]--;}}else{show('先选中领地');G.dia+=item.p;iU[id]--;}}
  else show('✅生效');
  renderItems();updUI();
}

// ===== GAME LOOP =====
let lt=null;
function startL(){
  stopL();
  lt=setInterval(()=>{
    if(G.over||!G.run)return;
    G.tl-=1;if(G.tl<=0){G.tl=0;endByT();return;}

    // Battle ticks (every second)
    tickBattles();

    // Production
    G.pl.forEach((p,pi)=>{
      if(!p.alive||!p.lands)return;
      const prod=tProd(pi),owned=G.t.filter(t=>t.owner===pi);
      if(!owned.length)return;
      const per=prod/owned.length;
      owned.forEach(t=>{if(!G.battles[t.id])t.troops+=per;});
    });

    updStats();render();renderSB();updUI();updEB();checkE();checkW();
  },1000);
}
function stopL(){if(lt){clearInterval(lt);lt=null;}}
function endByT(){const s=G.pl.map((p,i)=>({id:i,score:Math.floor(p.troops)+p.lands*10})).sort((a,b)=>b.score-a.score);end(s[0].id);}

// ===== TOAST =====
let tt=null;function show(msg){document.querySelectorAll('.toast').forEach(el=>el.remove());if(tt)clearTimeout(tt);const el=document.createElement('div');el.className='toast';el.textContent=msg;document.getElementById('mapC').appendChild(el);tt=setTimeout(()=>{el.remove();},2500);}

// ===== EVENTS =====
document.getElementById('adB').onclick=()=>{if(G.over)return;G.dia+=20;show('📺+20💎');updUI();};
document.getElementById('helpB').onclick=()=>show('🎯点击己方领地选中(黄框)→再点相邻目标出兵');

// ===== INIT =====
function init(){
  //v=20260608.1
  G.pl=PN.map((n,i)=>({id:i,name:n,color:PC[i],troops:0,lands:0,alive:true}));
  G.t=TERRITORIES.map(t=>{
    let owner=-1;
    for(const [pid,starts] of Object.entries(PSTARTS)){if(starts.includes(t.id)){owner=parseInt(pid);break;}}
    return{...t,owner,troops:owner>=0?18:Math.floor(Math.random()*4)+3,_sh:0};
  });
  G.sel=null;G.tl=300;G.dia=200;G.run=true;G.over=false;G.battles={};G._buid=0;
  updStats();render();renderSB();renderItems();updUI();updEB();
  startL();startAI();
}
init();
</script>

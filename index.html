<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>领土战争·合并版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;}
body{background:#0a0e17;font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;}
#app{width:100%;max-width:480px;height:100vh;max-height:920px;background:linear-gradient(145deg,#111827,#0f172a);display:flex;flex-direction:column;position:relative;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.8);}
.header{display:flex;align-items:center;justify-content:space-between;padding:6px 10px 4px;background:rgba(0,0,0,.4);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;z-index:10;}
.header .left{display:flex;align-items:center;gap:5px;}
.header .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.header .lb{font-size:11px;color:#94a3b8;}
.header .tp{font-size:13px;font-weight:700;color:#fff;}
.timer{font-size:18px;font-weight:900;font-variant-numeric:tabular-nums;color:#38bdf8;letter-spacing:1px;}
.timer.warn{color:#ef4444;animation:pulse 1s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.dia{display:flex;align-items:center;gap:3px;font-size:12px;color:#fbbf24;font-weight:700;}
.sb{display:flex;gap:2px;padding:2px 6px;flex-shrink:0;background:rgba(0,0,0,.2);border-bottom:1px solid rgba(255,255,255,.04);flex-wrap:wrap;}
.sbi{flex:1;min-width:60px;display:flex;align-items:center;gap:2px;padding:1px 4px;border-radius:3px;font-size:9px;background:rgba(255,255,255,.04);}
.sbi .sd{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sbi .sn{color:#94a3b8;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:8px;}
.sbi .st{color:#e2e8f0;font-weight:700;font-size:10px;}
.sbi .sl{color:#64748b;font-size:8px;}
.sbi .se{color:#4ade80;font-size:8px;}
.sbi.me{background:rgba(56,189,248,.12);}
.mapC{flex:1;position:relative;overflow:hidden;min-height:0;display:flex;align-items:center;justify-content:center;padding:4px;}

/* Individual cell grid */
.cell-grid{position:relative;flex-shrink:0;}
.cell{
  position:absolute;border-radius:2px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:11px;font-weight:700;color:#fff;z-index:1;
  border:1px solid rgba(255,255,255,.08);
  transition:border-color .15s,opacity .15s;
  text-shadow:0 1px 3px rgba(0,0,0,.6);
}
.cell.neutral{background:rgba(51,65,85,.4);color:rgba(255,255,255,.3);border-color:rgba(255,255,255,.05);}
.cell.owned{background:transparent;border-color:transparent;}
.cell.owned.p0{background:rgba(239,68,68,.45);}
.cell.owned.p1{background:rgba(59,130,246,.45);}
.cell.owned.p2{background:rgba(34,197,94,.45);}
.cell.owned.p3{background:rgba(249,115,22,.45);}
.cell.sel{z-index:3;border-color:#fff!important;border-width:2px!important;}
.cell.tgt{z-index:2;animation:cg .6s ease-in-out infinite;}

/* Battle progress bar */
.cell .cbar{position:absolute;bottom:1px;left:1px;height:3px;border-radius:1px;overflow:hidden;right:1px;background:rgba(0,0,0,.3);}
.cell .cbar .cfill{height:100%;background:linear-gradient(90deg,#fbbf24,#f59e0b);transition:width .3s;}

@keyframes cg{0%,100%{border-color:rgba(255,255,255,.4)}50%{border-color:rgba(255,255,255,.9)}}

/* Region outline overlay (SVG) */
.mapC svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:4;}

/* Region troop label */
.rl{
  position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:5;pointer-events:auto;cursor:pointer;border-radius:8px;
  background:rgba(0,0,0,.55);backdrop-filter:blur(4px);
  border:2px solid rgba(255,255,255,.2);padding:4px 10px;
  transform:translate(-50%,-50%);min-width:40px;text-align:center;
}
.rl .rt{font-size:18px;font-weight:900;color:#fff;line-height:1.2;text-shadow:0 1px 6px rgba(0,0,0,.6);}
.rl .rn{font-size:8px;color:rgba(255,255,255,.4);}
.rl.sel{border-color:#fff;box-shadow:0 0 12px rgba(255,255,255,.2);}

.eb{position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:6;display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);border-radius:0 0 8px 8px;padding:2px 10px 3px;border:1px solid rgba(255,255,255,.06);border-top:none;pointer-events:none;}
.eb .el{font-size:9px;color:#64748b;}
.eb .ev{font-size:12px;font-weight:900;color:#4ade80;}

.bb{flex-shrink:0;padding:4px 6px 6px;background:rgba(0,0,0,.4);border-top:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;gap:4px;}
.ir{display:flex;gap:3px;overflow-x:auto;padding-bottom:1px;}
.ib{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:3px 6px;border-radius:5px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);cursor:pointer;gap:1px;font-size:8px;color:#e2e8f0;}
.ib:hover{background:rgba(255,255,255,.12);}
.ib .ip{font-size:7px;color:#fbbf24;font-weight:700;}
.ib.used{opacity:.4;pointer-events:none;}
.ba{display:flex;gap:4px;align-items:center;}
.ba button{flex:1;padding:5px 0;border:none;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;}
.bf{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;}
.bh{background:linear-gradient(135deg,#6366f1,#4338ca);color:#fff;font-size:9px;}
.bm{background:rgba(255,255,255,.08);color:#94a3b8;font-size:9px;flex:0 0 auto;padding:5px 10px;}

.toast{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:6px 14px;border-radius:7px;font-size:11px;font-weight:600;z-index:50;white-space:nowrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);animation:ti .25s ease-out;}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="left"><span class="dot" style="background:#ef4444"></span><span class="lb">你</span><span class="tp" id="myT">0</span></div>
    <div class="timer" id="timer">05:00</div>
    <div class="dia">💎<span id="dC">200</span></div>
  </div>
  <div class="sb" id="sb"></div>
  <div class="mapC" id="mapC">
    <svg id="svgM"></svg>
    <div class="cell-grid" id="cg"></div>
  </div>
  <div class="eb" id="eb" style="display:none"><span class="el">📈合并效率</span><span class="ev" id="ev">x1.0</span></div>
  <div class="bb">
    <div class="ir" id="ir"></div>
    <div class="ba">
      <button class="bm">⚡5:00</button>
      <button class="bf" id="helpB">🎯选领地→点目标</button>
      <button class="bh" id="adB">📺+20💎</button>
    </div>
  </div>
</div>

<script>
// ===== CONFIG =====
const PN=['你','蓝方','绿方','橙方'], PC=['#ef4444','#3b82f6','#22c55e','#f97316'];
const G=9, CS=40, GP=3; // Grid 9, Cell Size, Gap
const PSTARTS={0:[0,1,9,10],1:[7,8,16,17],2:[63,64,72,73],3:[70,71,79,80]};
const NAMES=['王城','铁壁','狼烟','哨塔','虎踞','龙盘','隘口','箭楼','烽燧',
  '兵营','校场','武库','粮仓','马厩','瓮城','角楼','箭塔','壕沟',
  '前哨','斥候','驿站','关卡','隧','寨','屯','营','垒',
  '东市','西市','南仓','北库','左营','右营','前军','后军','中军',
  '青龙','白虎','朱雀','玄武','天枢','天璇','天玑','天权','玉衡',
  '开阳','摇光','北斗','南斗','东岳','西岳','南岳','北岳','中岳',
  '春分','夏至','秋分','冬至','立春','立夏','立秋','立冬','谷雨',
  '小满','芒种','小暑','大暑','处暑','白露','霜降','小雪','大雪',
  '甲子','乙丑','丙寅','丁卯','戊辰','己巳','庚午','辛未','壬申',
  '癸酉','甲戌','乙亥','丙子','丁丑','戊寅','己卯','庚辰','辛巳'];

// ===== STATE =====
let S={pl:[],t:[],sel:null,cp:0,tl:300,dia:200,run:true,over:false,battles:{},_buid:0,_sz:0,_gp:0,_ox:0,_oy:0};

// ===== BUILD MAP =====
const ALL_T=[];
for(let r=0;r<G;r++)for(let c=0;c<G;c++){
  const n=[];if(r>0)n.push(r*G+c-G);if(r<G-1)n.push(r*G+c+G);if(c>0)n.push(r*G+c-1);if(c<G-1)n.push(r*G+c+1);
  ALL_T.push({id:r*G+c,r,c,n});
}

function id(r,c){return r*G+c;}
function rc(i){return{r:Math.floor(i/G),c:i%G};}
function regs(pid){const v=new Set(),r=[];S.t.filter(t=>t.owner===pid).forEach(t=>{if(v.has(t.id))return;const q=[t.id];v.add(t.id);const reg=[];while(q.length){const c=q.shift();reg.push(c);S.t[c].n.forEach(n=>{const nt=S.t[n];if(nt.owner===pid&&!v.has(n)){v.add(n);q.push(n);}});}r.push(reg);});return r;}
function rTr(ids){return ids.reduce((s,i)=>s+Math.floor(S.t[i].troops),0);}
function adj(a,b){for(const sa of a)for(const n of S.t[sa].n)if(b.includes(n))return true;return false;}

// Draw region outlines (pixel-based, handles gaps correctly)
function drawOutlines(svg, sz, gp, ox, oy){
  let html='';
  S.pl.forEach((p,pi)=>{
    if(!p.alive)return;
    const rgs=regs(pi);
    rgs.forEach(reg=>{
      if(reg.length<2)return;
      const set=new Set(reg);
      let lines=[];
      for(const i of reg){
        const{r,c}=rc(i);
        const x=ox+c*(sz+gp),y=oy+r*(sz+gp);
        // Check 4 neighbors: if not same region, draw edge
        const u=set.has(r>0?id(r-1,c):-1);
        const d=set.has(r<G-1?id(r+1,c):-1);
        const l=set.has(c>0?id(r,c-1):-1);
        const r2=set.has(c<G-1?id(r,c+1):-1);
        if(!u)lines.push(`${x} ${y} ${x+sz} ${y}`);       // top
        if(!r2)lines.push(`${x+sz} ${y} ${x+sz} ${y+sz}`); // right
        if(!d)lines.push(`${x+sz} ${y+sz} ${x} ${y+sz}`); // bottom
        if(!l)lines.push(`${x} ${y+sz} ${x} ${y}`);        // left
      }
      if(!lines.length)return;
      const isSel=S.sel&&S.sel.tid!==-1&&reg.includes(S.sel.tid);
      const isTgt=S.sel&&S.sel.player===S.cp&&pi!==S.cp&&adj([S.sel.tid],reg);
      const col=isSel?'#fff':PC[pi];
      const w=isSel?3:2;
      const op=isTgt ? .8 : .5;
      for(const l of lines){
        html+=`<line x1="${l.split(' ')[0]}" y1="${l.split(' ')[1]}" x2="${l.split(' ')[2]}" y2="${l.split(' ')[3]}" stroke="${col}" stroke-width="${w}" opacity="${op}" stroke-linecap="round"/>`;
      }
    });
  });
  svg.innerHTML=html;
}

// ===== RENDER =====
let _sz=0,_ox=0,_oy=0;
function render(){
  const mc=document.getElementById('mapC'),cg=document.getElementById('cg'),svg=document.getElementById('svgM');
  const avail=Math.min(mc.clientWidth-8,mc.clientHeight-8);
  const tw=G*CS+(G-1)*GP,scl=Math.min(1,avail/tw);
  const sz=CS*scl,gp=GP*scl,ox=(mc.clientWidth-(G*sz+(G-1)*gp))/2,oy=(mc.clientHeight-(G*sz+(G-1)*gp))/2;
  _sz=sz;_ox=ox;_oy=oy;
  S._sz=sz;S._gp=gp;S._ox=ox;S._oy=oy;

  // ---- Cells ----
  cg.style.width=(G*sz+(G-1)*gp)+'px';
  cg.style.height=(G*sz+(G-1)*gp)+'px';
  let chtml='';
  for(let r=0;r<G;r++)for(let c=0;c<G;c++){
    const i=r*G+c,t=S.t[i];
    const x=c*(sz+gp),y=r*(sz+gp);
    const isSel=S.sel&&S.sel.tid===i;
    const isTgt=S.sel&&S.sel.player===S.cp&&t.owner!==S.cp&&adj([S.sel.tid],[i]);
    const owned=t.owner>=0;
    const cls=`cell${owned?' owned p'+t.owner:' neutral'}${isSel?' sel':''}${isTgt?' tgt':''}`;
    const bt=S.battles[i];
    const bar=bt?`<div class="cbar"><div class="cfill" style="width:${Math.floor(bt.progress*100)}%"></div></div>`:'';
    chtml+=`<div class="${cls}" style="left:${x}px;top:${y}px;width:${sz}px;height:${sz}px" data-id="${i}">${owned?'':Math.floor(t.troops)}${bar}</div>`;
  }
  cg.innerHTML=chtml;

  // Cell click
  cg.querySelectorAll('.cell').forEach(el=>{el.onclick=()=>onCell(parseInt(el.dataset.id));});

  // ---- Region outlines (SVG) ----
  drawOutlines(svg, sz, gp, ox, oy);

  // ---- Region troop labels ----
  document.querySelectorAll('.rl').forEach(el=>el.remove());
  S.pl.forEach((p,pi)=>{
    if(!p.alive)return;
    const regions=regs(pi);
    regions.forEach(reg=>{
      if(reg.length<2)return;
      // Centroid
      let sx=0,sy=0;reg.forEach(i=>{sx+=rc(i).c;sy+=rc(i).r;});sx/=reg.length;sy/=reg.length;
      const troops=rTr(reg);
      const el=document.createElement('div');
      el.className='rl'+(S.sel&&reg.includes(S.sel.tid)?' sel':'');
      el.style.left=(sx*(sz+gp)+ox+sz/2)+'px';
      el.style.top=(sy*(sz+gp)+oy+sz/2)+'px';
      el.innerHTML=`<div class="rt">${Math.floor(troops)}</div><div class="rn">${reg.length}块合并</div>`;
      el.onclick=()=>onRegion(reg,pi);
      mc.appendChild(el);
    });
  });

  // Header
  const p=S.pl[S.cp];
  document.getElementById('myT').textContent=Math.floor(p.troops);
  document.getElementById('dC').textContent=S.dia;
}

// ===== INPUT =====
function onCell(id){
  if(S.over||!S.run)return;
  const t=S.t[id];
  if(t.owner===S.cp){
    S.sel=t.owner>=0?{player:S.cp,tid:id}:null;
    render();return;
  }
  if(S.sel&&S.sel.player===S.cp&&adj([S.sel.tid],[id])){
    if(S.battles[id]){show('正在战斗中');return;}
    const src=S.t[S.sel.tid],cnt=Math.floor(src.troops/2);
    if(cnt<=0){show('兵力不足');return;}
    const uid=++S._buid;
    S.battles[id]={progress:0,atkOwner:S.cp,atkTroops:cnt,defTroops:Math.floor(t.troops),uid,srcId:S.sel.tid};
    src.troops-=cnt;
    show('⚔️进攻！');
    render();updStats();renderSB();updUI();updEB();
    return;
  }
  if(S.sel)show('目标不相邻');else show('点击己方领地选中');
}
function onRegion(reg,pi){
  if(S.over||!S.run)return;
  if(pi===S.cp){
    const id=reg[0];
    S.sel=S.sel&&S.sel.tid===reg[0]?null:{player:S.cp,tid:id};
    render();return;
  }
  if(S.sel&&S.sel.player===S.cp&&adj([S.sel.tid],reg)){
    // Find target cell
    let tgtId=null;
    for(const n of S.t[S.sel.tid].n)if(reg.includes(n)){tgtId=n;break;}
    if(!tgtId||S.battles[tgtId]){show('正在战斗中');return;}
    const src=S.t[S.sel.tid],cnt=Math.floor(src.troops/2);
    if(cnt<=0){show('兵力不足');return;}
    const uid=++S._buid;
    S.battles[tgtId]={progress:0,atkOwner:S.cp,atkTroops:cnt,defTroops:Math.floor(S.t[tgtId].troops),uid,srcId:S.sel.tid};
    src.troops-=cnt;
    show('⚔️进攻！');
    render();updStats();renderSB();updUI();updEB();
    return;
  }
  if(S.sel)show('目标不相邻');else show('点击己方领地选中');
}

// ===== BATTLE =====
function tickB(){
  for(const id in S.battles){
    const b=S.battles[id],dst=S.t[id];
    const dmgA=Math.min(b.atkTroops,Math.max(1,Math.floor(b.defTroops*0.1)+1));
    const dmgD=Math.min(b.defTroops,Math.max(1,Math.floor(b.atkTroops*0.07)+1));
    b.atkTroops-=dmgD;b.defTroops-=dmgA;
    const r=b.atkTroops/Math.max(1,b.defTroops+b.atkTroops);
    b.progress+=r*0.06-0.025;b.progress=Math.max(0,Math.min(1,b.progress));
    if(b.progress>=1||b.defTroops<=0){dst.owner=b.atkOwner;dst.troops=Math.max(1,b.atkTroops);delete S.battles[id];show('🔥攻占'+NAMES[id]);}
    else if(b.atkTroops<=0){dst.troops=Math.max(1,b.defTroops);delete S.battles[id];show('💥击退');}
    else dst.troops=Math.max(1,b.defTroops);
  }
}

// ===== AI =====
let aiT=null;
function startAI(){stopAI();aiT=setInterval(()=>{for(let i=1;i<S.pl.length;i++)if(S.pl[i].alive)aiTurn(i);},2800);}
function stopAI(){if(aiT){clearInterval(aiT);aiT=null;}}
function aiTurn(pid){
  if(S.over||!S.run)return;
  const rgs=regs(pid);
  for(const rg of rgs.sort(()=>Math.random()-0.5)){
    const total=rTr(rg);if(total<12)continue;
    const targets=[];const rs=new Set(rg);
    for(const sid of rg)for(const n of S.t[sid].n){const nt=S.t[n];if(nt.owner!==pid&&!S.battles[n]&&!targets.some(t=>t.id===n))targets.push({id:n,troops:nt.troops,owner:nt.owner});}
    if(!targets.length)continue;
    targets.sort((a,b)=>{if(a.owner<0&&b.owner>=0)return -1;if(a.owner>=0&&b.owner<0)return 1;return a.troops-b.troops;});
    const tg=targets[0],cnt=Math.min(Math.floor(total*0.5),total-5);
    if(cnt<=5)continue;
    const srcTs=rg.map(i=>S.t[i]);let rem=cnt;
    for(const t of srcTs){if(rem<=0)break;const sh=Math.min(Math.floor(t.troops),Math.ceil(rem/srcTs.filter(x=>x.troops>0).length));t.troops-=sh;rem-=sh;}
    if(rem>0&&srcTs.length>0)srcTs[0].troops-=rem;
    const uid=++S._buid;
    S.battles[tg.id]={progress:0,atkOwner:pid,atkTroops:cnt,defTroops:Math.floor(S.t[tg.id].troops),uid,srcId:rg[0]};
    break;
  }
}

// ===== UPDATE =====
function updStats(){S.pl.forEach(p=>{p.troops=0;p.lands=0;});S.t.forEach(t=>{if(t.owner>=0){S.pl[t.owner].troops+=Math.floor(t.troops);S.pl[t.owner].lands++;}});}
function updUI(){const p=S.pl[S.cp];document.getElementById('myT').textContent=Math.floor(p.troops);document.getElementById('dC').textContent=S.dia;const t=document.getElementById('timer'),m=Math.floor(S.tl/60),s=Math.floor(S.tl%60);t.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');t.classList.toggle('warn',S.tl<60);}
function updEB(){const b=document.getElementById('eb'),v=document.getElementById('ev'),p=S.pl[S.cp];if(p.alive&&p.lands>0){const e=1+(p.lands-1)*0.08;v.textContent='+'+Math.floor(p.lands*2*e)+'/秒(x'+e.toFixed(2)+')';b.style.display='flex';}else b.style.display='none';}
function renderSB(){document.getElementById('sb').innerHTML=S.pl.map((p,i)=>'<div class="sbi'+(i===S.cp?' me':'')+'" style="'+(p.alive?'':'opacity:.3')+'"><span class="sd" style="background:'+p.color+'"></span><span class="sn">'+p.name+(p.alive?'':'💀')+'</span><span class="st">'+Math.floor(p.troops)+'</span><span class="sl">('+p.lands+')</span><span class="se">x'+(p.alive?(1+(p.lands-1)*0.08).toFixed(2):'0')+'</span></div>').join('');}
function checkE(){const a=new Set();S.t.forEach(t=>{if(t.owner>=0)a.add(t.owner);if(S.battles[t.id])a.add(S.battles[t.id].atkOwner);});S.pl.forEach((p,i)=>{p.alive=a.has(i)||i===S.cp;});}
function checkW(){if(S.over)return;const a=S.pl.filter(p=>p.alive);if(a.length<=1&&S.pl.some(p=>p.alive))end(a[0]?.id);}
function end(wid){S.over=true;S.run=false;stopAI();clearInterval(lt);lt=null;
  const s=S.pl.map((p,i)=>({name:p.name,troops:Math.floor(p.troops),lands:p.lands,score:Math.floor(p.troops)+p.lands*10})).sort((a,b)=>b.score-a.score);
  const rk=s.findIndex(x=>x.name===S.pl[S.cp].name)+1;let m='🏆对局结束！\n'+(wid===S.cp?'🎉你赢了！':wid>=0?S.pl[wid].name+'获胜':'⚖️平局！')+'\n\n';
  s.forEach((x,i)=>{m+=(['🥇','🥈','🥉'][i]||'#'+(i+1))+' '+x.name+(x.alive?'':'💀')+' 兵'+x.troops+' 地'+x.lands+' 总分'+x.score+'\n';});m+='\n排名:'+rk+'/'+s.length;show(m);}

// ===== ITEMS =====
const SI=[{id:'s',name:'🛡护盾',p:100,l:1},{id:'a',name:'✈空袭',p:200,l:1},{id:'re',name:'📦征兵',p:120,l:1}];let iU={};
function renderItems(){document.getElementById('ir').innerHTML=SI.map(it=>'<div class="ib'+(iU[it.id]>=it.l?' used':'')+'" data-id="'+it.id+'"><span>'+it.name+'</span><span class="ip">💎'+it.p+'</span></div>').join('');document.querySelectorAll('.ib:not(.used)').forEach(b=>b.onclick=()=>useI(b.dataset.id));}
function useI(id){if(S.over)return;const it=SI.find(i=>i.id===id);if(!it)return;const u=iU[id]||0;if(u>=it.l){show('❌已用尽');return;}if(S.dia<it.p){show('💎还差'+(it.p-S.dia));return;}S.dia-=it.p;iU[id]=(iU[id]||0)+1;
  if(id==='s'){if(!S.sel||S.t[S.sel.tid].owner!==S.cp){show('先选中己方领土');S.dia+=it.p;iU[id]--;return;}S.t[S.sel.tid]._sh=1;show('🛡护盾！');setTimeout(()=>{if(S.t[S.sel.tid])S.t[S.sel.tid]._sh=0;},8000);}
  else if(id==='a'){const t=S.t.filter(t=>t.owner!==S.cp&&t.owner>=0);if(t.length){const tg=t.sort((a,b)=>b.troops-a.troops)[0];let d=Math.min(50,Math.max(1,Math.floor(tg.troops-1)));tg.troops-=d;show('✈空袭!'+(-d));render();renderSB();updUI();updEB();checkE();checkW();}else show('✈无目标');}
  else if(id==='re'){if(!S.sel||S.t[S.sel.tid].owner!==S.cp){show('先选中己方领土');S.dia+=it.p;iU[id]--;return;}S.t[S.sel.tid].troops+=30;show('📦+30援军');render();renderSB();updUI();updEB();}
  renderItems();updUI();}

// ===== LOOP =====
let lt=null;
function startL(){stopL();lt=setInterval(()=>{if(S.over||!S.run)return;S.tl-=1;if(S.tl<=0){S.tl=0;endByT();return;}
  tickB();S.pl.forEach((p,pi)=>{if(!p.alive||!p.lands)return;const o=S.t.filter(t=>t.owner===pi);if(!o.length)return;const e=1+(p.lands-1)*0.08;const prod=Math.floor(p.lands*2*e);const per=prod/o.length;o.forEach(t=>{if(!S.battles[t.id])t.troops+=per;});});
  updStats();render();renderSB();updUI();updEB();checkE();checkW();},1000);}
function stopL(){if(lt){clearInterval(lt);lt=null;}}
function endByT(){const s=S.pl.map((p,i)=>({id:i,score:Math.floor(p.troops)+p.lands*10})).sort((a,b)=>b.score-a.score);end(s[0].id);}

// ===== TOAST =====
let tt=null;function show(msg){document.querySelectorAll('.toast').forEach(el=>el.remove());if(tt)clearTimeout(tt);const el=document.createElement('div');el.className='toast';el.textContent=msg;document.getElementById('mapC').appendChild(el);tt=setTimeout(()=>{el.remove();},2500);}

// ===== EVENTS =====
document.getElementById('adB').onclick=()=>{if(S.over)return;S.dia+=20;show('📺+20💎');updUI();};
document.getElementById('helpB').onclick=()=>show('🎯点击己方格子选中→点相邻目标出兵');

// ===== INIT =====
function init(){
  S.pl=PN.map((n,i)=>({id:i,name:n,color:PC[i],troops:0,lands:0,alive:true}));
  S.t=ALL_T.map(t=>{let o=-1;for(const[p,s]of Object.entries(PSTARTS))if(s.includes(t.id)){o=parseInt(p);break;}return{...t,owner:o,troops:o>=0?18:Math.floor(Math.random()*4)+3,_sh:0};});
  S.sel=null;S.tl=300;S.dia=200;S.run=true;S.over=false;S.battles={};S._buid=0;
  updStats();render();renderSB();renderItems();updUI();updEB();
  startL();startAI();}
init();
</script>
</body>
